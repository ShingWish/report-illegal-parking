name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 單元測試（PURE 區純函式）
        run: node test/parse.test.js
      - name: 檢查 index.html 變更是否有 bump sw.js 的 CACHE 版本
        if: github.event_name == 'push'
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          # 新分支或 force push 時 before 可能不存在，直接跳過
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -qx 'index.html' \
             && ! git diff "$BEFORE" "${{ github.sha }}" -- sw.js | grep -q '^[+-]const CACHE'; then
            echo "::warning file=sw.js::index.html 已變更但 sw.js 的 CACHE 版本沒有 bump——已安裝 App 的使用者離線快取不會失效，記得下次補 bump"
          fi
